<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Voxel World</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: #0f111a; font-family: system-ui, -apple-system, sans-serif; }
    #canvas-container { width: 100%; height: 100%; }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #fff; font-size: 1.2rem; letter-spacing: 1px; font-weight: 600;
      background: rgba(15, 17, 26, 0.85); padding: 20px 36px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); pointer-events: none; transition: opacity 0.5s;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center;
    }
    #ui {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.8); font-size: 0.85rem; background: rgba(15, 17, 26, 0.7);
      padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1); pointer-events: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/MTLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
</head>
<body>

<div id="loading">Загрузка воксельной арены...</div>
<div id="ui">🖱️ ЛКМ — Вращение | ПКМ / Колесико — Перемещение | Скролл — Зум</div>
<div id="canvas-container"></div>

<script>
  const container = document.getElementById('canvas-container');
  const loadingEl = document.getElementById('loading');

  // 1. Создаем сцену
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f111a);
  scene.fog = new THREE.FogExp2(0x0f111a, 0.0015);

  // 2. Камера
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);

  // 3. Рендерер
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  // 4. Управление мышкой
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.maxPolarAngle = Math.PI / 2 - 0.01;

  // 5. Освещение
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
  dirLight.position.set(200, 400, 200);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  scene.add(dirLight);

  const hemiLight = new THREE.HemisphereLight(0xffffff, 0x222233, 0.35);
  hemiLight.position.set(0, 300, 0);
  scene.add(hemiLight);

  // 6. Загрузка экспортированных из MagicaVoxel файлов
  const mtlLoader = new THREE.MTLLoader();
  mtlLoader.load('untitled.mtl', (materials) => {
    materials.preload();

    const objLoader = new THREE.OBJLoader();
    objLoader.setMaterials(materials);
    objLoader.load('untitled.obj', (object) => {
      object.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      scene.add(object);

      // Автоматическое центрирование и фокусировка
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      controls.target.copy(center);
      const maxDim = Math.max(size.x, size.y, size.z);
      camera.position.set(center.x + maxDim * 0.8, center.y + maxDim * 0.8, center.z + maxDim * 1.1);
      controls.update();

      loadingEl.style.opacity = '0';
      setTimeout(() => loadingEl.remove(), 500);
    }, 
    (xhr) => {
      if (xhr.lengthComputable) {
        const percent = Math.round((xhr.loaded / xhr.total) * 100);
        loadingEl.innerText = `Загрузка 3D сцены: ${percent}%`;
      }
    });
  });

  // 7. Рендер-цикл
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
